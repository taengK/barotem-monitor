name: 바로템 모니터링

on:
  schedule:
    # 5분마다 실행 (GitHub Actions 최소 주기)
    # 워크플로우 내부에서 1분 간격 5회 체크
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install dependencies
        run: pip install selenium

      - name: Run monitor
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          CI: 'true'
        run: python barotem_monitor.py --ci --loop 5

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add barotem_data.json kakao_token.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update: 모니터링 데이터 갱신 $(date -u +'%Y-%m-%d %H:%M')"
          git push
